<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>日文單字</title>
    <style>
        :root { --primary: #007bff; --danger: #ff4757; --warning: #ffa502; --bg: #ffffff; --card-bg: #f8f9fa; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: var(--bg); margin: 0; overflow: hidden; height: 100vh; color: #2f3542; }
        
        /* 頂部導覽 */
        .header { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; border-bottom: 1px solid #eee; }
        select { border: none; font-size: 16px; font-weight: bold; outline: none; background: transparent; color: var(--primary); }

        /* 閃卡主區域 */
        .main-content { height: calc(100vh - 150px); display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 0 30px; }
        .card { width: 100%; max-width: 320px; height: 380px; perspective: 1000px; cursor: pointer; }
        .card-inner { position: relative; width: 100%; height: 100%; transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); transform-style: preserve-3d; }
        .card.flipped .card-inner { transform: rotateY(180deg); }
        .card-front, .card-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; flex-direction: column; justify-content: center; align-items: center; border-radius: 30px; background: var(--card-bg); box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .card-back { transform: rotateY(180deg); background: #eef5ff; color: var(--primary); }
        #word-display { font-size: 2.5rem; font-weight: 800; text-align: center; padding: 0 20px; }
        #meaning-display { font-size: 1.8rem; font-weight: 500; }
        
        /* 控制按鈕 */
        .nav-controls { position: fixed; bottom: 40px; display: flex; gap: 40px; align-items: center; }
        .nav-btn { background: #f1f2f6; border: none; width: 60px; height: 60px; border-radius: 50%; font-size: 20px; cursor: pointer; color: #57606f; transition: 0.2s; }
        .nav-btn:active { transform: scale(0.9); background: #dfe4ea; }

        /* 側邊欄 */
        .sidebar { position: fixed; top: 0; right: -100%; width: 85%; height: 100%; background: white; z-index: 1000; transition: 0.3s; box-shadow: -5px 0 15px rgba(0,0,0,0.1); padding: 20px; box-sizing: border-box; }
        .sidebar.active { right: 0; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 999; display: none; }
        .overlay.active { display: block; }

        /* 管理表單 */
        .admin-section { display: flex; flex-direction: column; gap: 15px; margin-top: 20px; }
        input { padding: 12px; border: 1px solid #ddd; border-radius: 10px; font-size: 16px; }
        .primary-btn { padding: 15px; border: none; border-radius: 10px; background: var(--primary); color: white; font-weight: bold; }
        .secondary-btn { padding: 10px; border: 1px solid #ddd; border-radius: 10px; background: none; color: #666; font-size: 14px; }

        /* 功能小標記 */
        .badge { position: absolute; top: 25px; left: 30px; font-size: 12px; color: #a1a1a1; font-weight: bold; letter-spacing: 1px; }
        .star-btn { position: absolute; top: 20px; right: 25px; font-size: 24px; color: #ddd; background: none; border: none; padding: 10px; }
        .star-btn.active { color: var(--warning); }
    </style>
</head>
<body>

    <div class="header">
        <select id="catFilter" onchange="changeCategoryFilter()">
            <option value="all">所有單字</option>
        </select>
        <button onclick="toggleSidebar()" style="background:none; border:none; font-size:24px;">≡</button>
    </div>

    <div class="main-content">
        <div class="card" id="flashcard" onclick="flipCard()">
            <div class="card-inner">
                <div class="card-front">
                    <span id="cat-display" class="badge">分類</span>
                    <button id="pinBtn" class="star-btn" onclick="togglePin(event)">★</button>
                    <div id="word-display">開始背誦吧</div>
                    <button style="margin-top:20px; border:none; background:#eee; padding:8px 15px; border-radius:20px; font-size:12px;" onclick="speakWord(event)">🔊 發音</button>
                </div>
                <div class="card-back">
                    <div id="meaning-display">意思</div>
                </div>
            </div>
        </div>

        <div class="nav-controls">
            <button class="nav-btn" onclick="prevWord()">←</button>
            <div id="counter" style="color:#a4b0be; font-size:14px;">0 / 0</div>
            <button class="nav-btn" onclick="nextWord()">→</button>
        </div>
    </div>

    <div class="overlay" id="overlay" onclick="toggleSidebar()"></div>
    <div class="sidebar" id="sidebar">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h3>管理單字本</h3>
            <button onclick="toggleSidebar()" style="background:none; border:none; font-size:20px;">✕</button>
        </div>
        
        <div class="admin-section">
            <div id="editTitle" style="font-size:14px; color:var(--warning); display:none;">💡 正在編輯模式</div>
            <input type="text" id="catInput" placeholder="輸入分類 (例: 第一課)" list="cat-history">
            <datalist id="cat-history"></datalist>
            <input type="text" id="jpInput" placeholder="日文">
            <input type="text" id="cnInput" placeholder="中文意思">
            <button id="addBtn" class="primary-btn" onclick="addWord()">新增單字</button>
            <div id="editBtns" style="display:none; gap:10px;">
                <button class="primary-btn" style="flex:2; background:var(--warning)" onclick="saveEdit()">儲存修改</button>
                <button class="primary-btn" style="flex:1; background:#ccc" onclick="cancelEdit()">取消</button>
            </div>
            <hr style="width:100%; border:0.5px solid #eee; margin:10px 0;">
            <button class="secondary-btn" onclick="shuffleWords()">🔀 亂序排列</button>
            <button id="filterBtn" class="secondary-btn" onclick="toggleFilter()">🎯 只看不懂的</button>
            <button class="secondary-btn" style="color:var(--danger)" onclick="deleteWord()">🗑️ 刪除此單字</button>
            <div style="margin-top:20px; display:flex; gap:10px;">
                <button class="secondary-btn" style="flex:1" onclick="exportData()">💾 備份</button>
                <button class="secondary-btn" style="flex:1" onclick="importData()">📂 匯入</button>
            </div>
        </div>
    </div>

    <script>
        let allWords = JSON.parse(localStorage.getItem('myWords')) || [];
        let isFilterMode = false, selectedCategory = "all", displayList = [], currentIndex = 0, editTargetId = null;

        // 語音
        let jpVoice = null;
        function loadVoices() { jpVoice = window.speechSynthesis.getVoices().find(v => v.lang.includes('ja')); }
        window.speechSynthesis.onvoiceschanged = loadVoices;
        loadVoices();

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('active');
            document.getElementById('overlay').classList.toggle('active');
        }

        function flipCard() { document.getElementById('flashcard').classList.toggle('flipped'); }

        function updateDisplayList() {
            let filtered = selectedCategory === "all" ? allWords : allWords.filter(w => (w.cat || "未分類") === selectedCategory);
            if (isFilterMode) filtered = filtered.filter(w => w.isHard);
            displayList = filtered;
            if (currentIndex >= displayList.length) currentIndex = 0;
            updateCategoryUI();
            render();
        }

        function updateCategoryUI() {
            const filter = document.getElementById('catFilter');
            const history = document.getElementById('cat-history');
            const cats = [...new Set(allWords.map(w => w.cat || "未分類"))];
            filter.innerHTML = '<option value="all">所有分類</option>' + cats.map(c => `<option value="${c}">${c}</option>`).join('');
            filter.value = selectedCategory;
            history.innerHTML = cats.map(c => `<option value="${c}">`).join('');
        }

        function addWord() {
            const cat = document.getElementById('catInput').value.trim() || "未分類";
            const jp = document.getElementById('jpInput').value.trim();
            const cn = document.getElementById('cnInput').value.trim();
            if (jp && cn) {
                allWords.push({ jp, cn, cat, isHard: false, id: Date.now() });
                save();
                selectedCategory = cat;
                updateDisplayList();
                currentIndex = displayList.length - 1;
                render();
                speakWord();
                document.getElementById('jpInput').value = ''; document.getElementById('cnInput').value = '';
                toggleSidebar();
            }
        }

        function startEdit() {
            const current = displayList[currentIndex];
            editTargetId = current.id;
            document.getElementById('catInput').value = current.cat;
            document.getElementById('jpInput').value = current.jp;
            document.getElementById('cnInput').value = current.cn;
            document.getElementById('editTitle').style.display = 'block';
            document.getElementById('addBtn').style.display = 'none';
            document.getElementById('editBtns').style.display = 'flex';
            toggleSidebar();
        }

        function saveEdit() {
            const idx = allWords.findIndex(w => w.id === editTargetId);
            allWords[idx] = {...allWords[idx], cat: document.getElementById('catInput').value, jp: document.getElementById('jpInput').value, cn: document.getElementById('cnInput').value};
            save(); cancelEdit(); updateDisplayList(); toggleSidebar();
        }

        function cancelEdit() {
            editTargetId = null;
            document.getElementById('editTitle').style.display = 'none';
            document.getElementById('addBtn').style.display = 'block';
            document.getElementById('editBtns').style.display = 'none';
            document.getElementById('catInput').value = ''; document.getElementById('jpInput').value = ''; document.getElementById('cnInput').value = '';
        }

        function render() {
            const wordDisp = document.getElementById('word-display'), meanDisp = document.getElementById('meaning-display'), 
                  catDisp = document.getElementById('cat-display'), counter = document.getElementById('counter'), pinBtn = document.getElementById('pinBtn');
            counter.innerText = displayList.length > 0 ? `${currentIndex + 1} / ${displayList.length}` : "0 / 0";
            if (displayList.length === 0) {
                wordDisp.innerText = "空空如也"; meanDisp.innerText = "點擊選單新增"; catDisp.innerText = "-"; pinBtn.classList.remove('active');
                return;
            }
            const current = displayList[currentIndex];
            wordDisp.innerText = current.jp; meanDisp.innerText = current.cn; catDisp.innerText = current.cat;
            current.isHard ? pinBtn.classList.add('active') : pinBtn.classList.remove('active');
            document.getElementById('flashcard').classList.remove('flipped');
        }

        function speakWord(e) {
            if (e) e.stopPropagation();
            if (displayList.length > 0) {
                window.speechSynthesis.cancel();
                const utter = new SpeechSynthesisUtterance(displayList[currentIndex].jp);
                if (jpVoice) utter.voice = jpVoice;
                utter.lang = 'ja-JP'; utter.rate = 0.85; window.speechSynthesis.speak(utter);
            }
        }

        function deleteWord() {
            if (displayList.length > 0 && confirm("刪除此單字？")) {
                allWords = allWords.filter(w => w.id !== displayList[currentIndex].id);
                save(); updateDisplayList(); toggleSidebar();
            }
        }

        function togglePin(e) {
            e.stopPropagation();
            displayList[currentIndex].isHard = !displayList[currentIndex].isHard;
            save(); render();
        }

        function toggleFilter() { isFilterMode = !isFilterMode; document.getElementById('filterBtn').style.color = isFilterMode ? "var(--warning)" : "#666"; currentIndex = 0; updateDisplayList(); toggleSidebar(); }
        function shuffleWords() { displayList.sort(() => Math.random() - 0.5); currentIndex = 0; render(); toggleSidebar(); }
        function changeCategoryFilter() { selectedCategory = document.getElementById('catFilter').value; currentIndex = 0; updateDisplayList(); }
        function nextWord() { if(displayList.length > 0) { currentIndex = (currentIndex + 1) % displayList.length; render(); } }
        function prevWord() { if(displayList.length > 0) { currentIndex = (currentIndex - 1 + displayList.length) % displayList.length; render(); } }
        function save() { localStorage.setItem('myWords', JSON.stringify(allWords)); }
        function exportData() { const a = document.createElement("a"); a.href = URL.createObjectURL(new Blob([JSON.stringify(allWords)], {type: "text/plain"})); a.download = "jp_words.txt"; a.click(); }
        function importData() { const i = document.createElement("input"); i.type = "file"; i.onchange = e => { const r = new FileReader(); r.onload = ev => { allWords = JSON.parse(ev.target.result); save(); location.reload(); }; r.readAsText(e.target.files[0]); }; i.click(); }
        
        updateDisplayList();
    </script>
</body>
</html>
<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="日文單字">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/197/197604.png">
    <link rel="manifest" href="data:application/json;base64,ewogICJuYW1lIjogIuaXpaWhruWlluWtl+acrSIsCiAgInNob3J0X25hbWUiIjogIuaXpaWhruWlluWtlSIsCiAgInN0YXJ0X3VybCI6ICJpbmRleC5odG1sIiwKICAiZGlzcGxheSI6ICJzdGFuZGFsb25lIiwKICAiYmFja2dyb3VuZF9jb2xvciI6ICIjZmZmZmZmIiwKICAidGhlbWVfY29sb3IiIjogIiMwMDdiZmYiCn0=">
    <title>日文單字 App</title>
    <style>
        :root { --primary: #007bff; --danger: #dc3545; --warning: #ffc107; --success: #28a745; --bg: #f4f7f9; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; min-height: 100vh; }
        .app-container { width: 100%; max-width: 400px; display: flex; flex-direction: column; }
        h2 { text-align: center; color: #333; margin: 10px 0; }
        
        /* 區塊樣式 */
        .section { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 15px; }
        .input-group { display: flex; flex-direction: column; gap: 8px; border: 2px solid transparent; transition: 0.3s; }
        .editing-mode { border-color: var(--warning); background: #fffdf5; }
        
        input, select { padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; outline: none; background: white; }
        
        /* 按鈕 */
        .btn { padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 15px; text-align: center; color: white; background: var(--primary); }
        .btn-sm { padding: 6px 12px; font-size: 13px; background: #6c757d; }
        .btn-edit { background: var(--warning); color: #333; }
        .btn-save { background: var(--success); }
        .btn-cancel { background: #6c757d; font-size: 12px; }

        /* 分類篩選 */
        .filter-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
        #catFilter { width: 100%; margin-top: 5px; border-color: var(--primary); font-weight: bold; }

        /* 閃卡 */
        .card { width: 100%; height: 200px; perspective: 1000px; margin-bottom: 15px; }
        .card-inner { position: relative; width: 100%; height: 100%; transition: transform 0.6s; transform-style: preserve-3d; }
        .card.flipped .card-inner { transform: rotateY(180deg); }
        .card-front, .card-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; flex-direction: column; justify-content: center; align-items: center; border-radius: 20px; background: white; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .card-front { border: 2px solid var(--primary); }
        .card-back { background: #e7f3ff; transform: rotateY(180deg); color: #0056b3; font-size: 1.6rem; text-align: center; padding: 10px; }
        
        #word-display { font-size: 2.2rem; font-weight: bold; }
        .cat-tag { position: absolute; top: 10px; right: 15px; font-size: 12px; background: #eee; padding: 2px 8px; border-radius: 10px; color: #666; }
        
        /* 控制區 */
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .full { grid-column: span 2; }
        .del-btn { background: var(--danger); font-size: 13px; margin-top: 5px; opacity: 0.8; }
        .is-hard { background: var(--warning) !important; color: #333 !important; }
        
        .backup-section { margin-top: 20px; display: flex; justify-content: center; gap: 20px; border-top: 1px solid #ddd; padding-top: 15px; }
        .backup-btn { background: transparent; color: #999; border: 1px solid #ccc; font-size: 11px; padding: 5px 8px; }
    </style>
</head>
<body>
    <div class="app-container">
        <h2>🇯🇵 日文單字筆記</h2>
        
        <div id="inputArea" class="section input-group">
            <b id="inputTitle" style="color:#555;">➕ 新增單字</b>
            <input type="text" id="catInput" placeholder="分類 (如: 第一課, 數字)" list="cat-history">
            <datalist id="cat-history"></datalist>
            <input type="text" id="jpInput" placeholder="日文">
            <input type="text" id="cnInput" placeholder="中文意思">
            <button id="addBtn" class="btn" onclick="addWord()">➕ 新增到單字本</button>
            <div id="editControls" style="display:none; gap:10px; display:flex;">
                <button class="btn btn-save" style="flex:2" onclick="saveEdit()">💾 儲存修改</button>
                <button class="btn btn-cancel" style="flex:1" onclick="cancelEdit()">取消</button>
            </div>
        </div>

        <div class="section" style="padding: 10px;">
            <div class="filter-row">
                <span id="counter" style="font-size:14px; color:#666;">數量: 0</span>
                <button id="filterBtn" class="btn btn-sm" onclick="toggleFilter()">🎯 只看不懂</button>
            </div>
            <select id="catFilter" onchange="changeCategoryFilter()">
                <option value="all">📁 顯示所有分類</option>
            </select>
        </div>

        <div class="card" id="flashcard" onclick="flipCard()">
            <div class="card-inner">
                <div class="card-front">
                    <div id="cat-display" class="cat-tag">分類</div>
                    <div id="word-display">尚未新增</div>
                    <button class="btn btn-sm" style="margin-top:10px" onclick="speakWord(event)">🔊 發音</button>
                </div>
                <div class="card-back" id="meaning-display">意思</div>
            </div>
        </div>

        <div class="controls">
            <button class="btn" onclick="prevWord(event)">⬅️ 上一個</button>
            <button class="btn" onclick="nextWord(event)">➡️ 下一個</button>
            <button id="pinBtn" class="btn full" onclick="togglePin(event)">⭐ 標記為不懂</button>
            <div class="full" style="display:flex; gap:10px; margin-top:5px;">
                <button class="btn btn-edit" style="flex:1" onclick="startEdit(event)">✏️ 修正單字/分類</button>
                <button class="btn del-btn" style="flex:1; margin-top:0" onclick="deleteWord(event)">🗑️ 刪除</button>
            </div>
        </div>

        <div class="backup-section">
            <button class="backup-btn" onclick="exportData()">💾 備份</button>
            <button class="backup-btn" onclick="importData()">📂 恢復</button>
        </div>
    </div>

    <script>
        let allWords = JSON.parse(localStorage.getItem('myWords')) || [];
        let isFilterMode = false;
        let selectedCategory = "all";
        let displayList = [];
        let currentIndex = 0;
        let editTargetId = null; // 紀錄正在編輯哪一個單字

        // 語音初始化
        let jpVoice = null;
        function loadVoices() {
            jpVoice = window.speechSynthesis.getVoices().find(v => v.lang.includes('ja'));
        }
        window.speechSynthesis.onvoiceschanged = loadVoices;
        loadVoices();

        function flipCard() { document.getElementById('flashcard').classList.toggle('flipped'); }

        function updateCategoryUI() {
            const filterSelect = document.getElementById('catFilter');
            const catHistory = document.getElementById('cat-history');
            const categories = [...new Set(allWords.map(w => w.cat || "未分類"))];
            
            filterSelect.innerHTML = '<option value="all">📁 顯示所有分類</option>';
            categories.forEach(cat => {
                const opt = document.createElement('option');
                opt.value = cat;
                opt.innerText = `📁 ${cat}`;
                filterSelect.appendChild(opt);
            });
            filterSelect.value = selectedCategory;

            catHistory.innerHTML = '';
            categories.forEach(cat => {
                const opt = document.createElement('option');
                opt.value = cat;
                catHistory.appendChild(opt);
            });
        }

        function updateDisplayList() {
            let filtered = selectedCategory === "all" ? allWords : allWords.filter(w => (w.cat || "未分類") === selectedCategory);
            if (isFilterMode) filtered = filtered.filter(w => w.isHard);
            displayList = filtered;
            if (currentIndex >= displayList.length) currentIndex = 0;
            render();
            updateCategoryUI();
        }

        // --- 編輯功能核心邏輯 ---

        function startEdit(e) {
            e.stopPropagation();
            if (displayList.length === 0) return;
            
            const current = displayList[currentIndex];
            editTargetId = current.id;
            
            // 填入資料
            document.getElementById('catInput').value = current.cat || "未分類";
            document.getElementById('jpInput').value = current.jp;
            document.getElementById('cnInput').value = current.cn;
            
            // 切換 UI 狀態
            document.getElementById('inputArea').classList.add('editing-mode');
            document.getElementById('inputTitle').innerText = "✏️ 正在修改單字...";
            document.getElementById('inputTitle').style.color = "var(--warning)";
            document.getElementById('addBtn').style.display = "none";
            document.getElementById('editControls').style.display = "flex";
            
            // 捲動到頂部方便修改
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function saveEdit() {
            const cat = document.getElementById('catInput').value.trim() || "未分類";
            const jp = document.getElementById('jpInput').value.trim();
            const cn = document.getElementById('cnInput').value.trim();

            if (jp && cn) {
                const idx = allWords.findIndex(w => w.id === editTargetId);
                if (idx !== -1) {
                    allWords[idx].cat = cat;
                    allWords[idx].jp = jp;
                    allWords[idx].cn = cn;
                    save();
                    alert("修改成功！");
                    cancelEdit(); // 恢復正常模式
                    updateDisplayList();
                }
            }
        }

        function cancelEdit() {
            editTargetId = null;
            document.getElementById('catInput').value = '';
            document.getElementById('jpInput').value = '';
            document.getElementById('cnInput').value = '';
            
            document.getElementById('inputArea').classList.remove('editing-mode');
            document.getElementById('inputTitle').innerText = "➕ 新增單字";
            document.getElementById('inputTitle').style.color = "#555";
            document.getElementById('addBtn').style.display = "block";
            document.getElementById('editControls').style.display = "none";
        }

        // --- 原有基礎邏輯 ---

        function addWord() {
            const cat = document.getElementById('catInput').value.trim() || "未分類";
            const jp = document.getElementById('jpInput').value.trim();
            const cn = document.getElementById('cnInput').value.trim();
            if (jp && cn) {
                allWords.push({ jp, cn, cat, isHard: false, id: Date.now() });
                save();
                selectedCategory = cat;
                updateDisplayList();
                currentIndex = displayList.length - 1;
                render();
                speakWord();
                document.getElementById('jpInput').value = '';
                document.getElementById('cnInput').value = '';
            }
        }

        function render() {
            const counter = document.getElementById('counter');
            const wordDisp = document.getElementById('word-display');
            const meanDisp = document.getElementById('meaning-display');
            const catDisp = document.getElementById('cat-display');
            const pinBtn = document.getElementById('pinBtn');
            
            counter.innerText = `數量: ${displayList.length}`;
            if (displayList.length === 0) {
                wordDisp.innerText = "目前無單字";
                meanDisp.innerText = "";
                catDisp.innerText = "-";
                pinBtn.style.display = "none";
                return;
            }
            pinBtn.style.display = "block";
            const current = displayList[currentIndex];
            wordDisp.innerText = current.jp;
            meanDisp.innerText = current.cn;
            catDisp.innerText = current.cat || "未分類";
            pinBtn.innerText = current.isHard ? "🌟 已標記不懂" : "⭐ 標記為不懂";
            pinBtn.className = current.isHard ? "btn full is-hard" : "btn full";
            document.getElementById('flashcard').classList.remove('flipped');
        }

        function speakWord(e) {
            if (e) e.stopPropagation();
            if (displayList.length > 0) {
                window.speechSynthesis.cancel();
                const utter = new SpeechSynthesisUtterance(displayList[currentIndex].jp);
                if (jpVoice) utter.voice = jpVoice;
                utter.lang = 'ja-JP';
                utter.rate = 0.85;
                window.speechSynthesis.speak(utter);
            }
        }

        function deleteWord(e) {
            e.stopPropagation();
            if (displayList.length === 0) return;
            if (confirm("確定刪除此單字？")) {
                const targetId = displayList[currentIndex].id;
                allWords = allWords.filter(w => w.id !== targetId);
                save();
                updateDisplayList();
            }
        }

        function togglePin(e) {
            e.stopPropagation();
            const current = displayList[currentIndex];
            current.isHard = !current.isHard;
            save();
            render();
        }

        function changeCategoryFilter() { selectedCategory = document.getElementById('catFilter').value; currentIndex = 0; updateDisplayList(); }
        function toggleFilter() { isFilterMode = !isFilterMode; document.getElementById('filterBtn').className = isFilterMode ? "btn btn-sm is-hard" : "btn btn-sm"; currentIndex = 0; updateDisplayList(); }
        function save() { localStorage.setItem('myWords', JSON.stringify(allWords)); }
        function nextWord(e) { e.stopPropagation(); if(displayList.length > 0) { currentIndex = (currentIndex + 1) % displayList.length; render(); } }
        function prevWord(e) { e.stopPropagation(); if(displayList.length > 0) { currentIndex = (currentIndex - 1 + displayList.length) % displayList.length; render(); } }

        function exportData() {
            const blob = new Blob([JSON.stringify(allWords)], {type: "text/plain"});
            const a = document.createElement("a");
            a.href = URL.createObjectURL(blob);
            a.download = "jp_backup.txt";
            a.click();
        }

        function importData() {
            const input = document.createElement("input");
            input.type = "file";
            input.onchange = e => {
                const reader = new FileReader();
                reader.onload = event => {
                    allWords = JSON.parse(event.target.result);
                    save();
                    location.reload();
                };
                reader.readAsText(e.target.files[0]);
            };
            input.click();
        }
        
        updateDisplayList();
    </script>
</body>
</html>
<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="日文單字">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/197/197604.png">
    <link rel="manifest" href="data:application/json;base64,ewogICJuYW1lIjogIuaXpaWhruWlluWtl+acrSIsCiAgInNob3J0X25hbWUiIjogIuaXpaWhruWlluWtlSIsCiAgInN0YXJ0X3VybCI6ICJpbmRleC5odG1sIiwKICAiZGlzcGxheSI6ICJzdGFuZGFsb25lIiwKICAiYmFja2dyb3VuZF9jb2xvciI6ICIjZmZmZmZmIiwKICAidGhlbWVfY29sb3IiIjogIiMwMDdiZmYiCn0=">
    <title>日文單字 App</title>
    <style>
        :root { --primary: #007bff; --danger: #dc3545; --warning: #ffc107; --bg: #f4f7f9; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; min-height: 100vh; }
        .app-container { width: 100%; max-width: 400px; display: flex; flex-direction: column; }
        h2 { text-align: center; color: #333; margin: 10px 0; }
        
        .section { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 15px; }
        .input-group { display: flex; flex-direction: column; gap: 8px; }
        input, select { padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; outline: none; background: white; }
        
        .btn { padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 15px; text-align: center; color: white; background: var(--primary); }
        .btn-sm { padding: 6px 12px; font-size: 13px; background: #6c757d; }
        
        /* 篩選與分類列 */
        .filter-bar { display: flex; flex-direction: column; gap: 10px; margin-bottom: 15px; }
        .filter-row { display: flex; justify-content: space-between; align-items: center; }
        #catFilter { width: 100%; margin-top: 5px; border-color: var(--primary); font-weight: bold; }

        .card { width: 100%; height: 200px; perspective: 1000px; margin-bottom: 15px; }
        .card-inner { position: relative; width: 100%; height: 100%; transition: transform 0.6s; transform-style: preserve-3d; }
        .card.flipped .card-inner { transform: rotateY(180deg); }
        .card-front, .card-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; flex-direction: column; justify-content: center; align-items: center; border-radius: 20px; background: white; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .card-front { border: 2px solid var(--primary); }
        .card-back { background: #e7f3ff; transform: rotateY(180deg); color: #0056b3; font-size: 1.6rem; text-align: center; padding: 10px; }
        
        #word-display { font-size: 2.2rem; font-weight: bold; }
        .cat-tag { position: absolute; top: 10px; right: 15px; font-size: 12px; background: #eee; padding: 2px 8px; border-radius: 10px; color: #666; }
        
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .full { grid-column: span 2; }
        .del-btn { background: var(--danger); font-size: 13px; margin-top: 5px; opacity: 0.8; }
        .is-hard { background: var(--warning) !important; color: #333 !important; }
        
        .backup-section { margin-top: 20px; display: flex; justify-content: center; gap: 20px; border-top: 1px solid #ddd; padding-top: 15px; }
        .backup-btn { background: transparent; color: #999; border: 1px solid #ccc; font-size: 11px; padding: 5px 8px; }
    </style>
</head>
<body>
    <div class="app-container">
        <h2>🇯🇵 日文分類單字本</h2>
        
        <div class="section input-group">
            <input type="text" id="catInput" placeholder="分類 (如: 第一課, 動詞, 數字)" list="cat-history">
            <datalist id="cat-history"></datalist>
            <input type="text" id="jpInput" placeholder="輸入日文">
            <input type="text" id="cnInput" placeholder="輸入中文意思">
            <button class="btn" onclick="addWord()">➕ 新增到單字本</button>
        </div>

        <div class="section" style="padding: 10px;">
            <div class="filter-row">
                <span id="counter" style="font-size:14px; color:#666;">數量: 0</span>
                <button id="filterBtn" class="btn btn-sm" onclick="toggleFilter()">🎯 只看不懂</button>
            </div>
            <select id="catFilter" onchange="changeCategoryFilter()">
                <option value="all">📁 顯示所有分類</option>
            </select>
            <div style="margin-top:8px; display:flex; gap:5px;">
                <button class="btn btn-sm" style="flex:1" onclick="shuffleWords()">🔀 亂序</button>
            </div>
        </div>

        <div class="card" id="flashcard" onclick="flipCard()">
            <div class="card-inner">
                <div class="card-front">
                    <div id="cat-display" class="cat-tag">分類</div>
                    <div id="word-display">尚未新增</div>
                    <button class="btn btn-sm" style="margin-top:10px" onclick="speakWord(event)">🔊 發音</button>
                </div>
                <div class="card-back" id="meaning-display">意思</div>
            </div>
        </div>

        <div class="controls">
            <button class="btn" onclick="prevWord(event)">⬅️ 上一個</button>
            <button class="btn" onclick="nextWord(event)">➡️ 下一個</button>
            <button id="pinBtn" class="btn full" onclick="togglePin(event)">⭐ 標記為不懂</button>
            <button class="btn del-btn full" onclick="deleteWord(event)">🗑️ 刪除目前單字</button>
        </div>

        <div class="backup-section">
            <button class="backup-btn" onclick="exportData()">💾 備份檔案</button>
            <button class="backup-btn" onclick="importData()">📂 恢復檔案</button>
        </div>
    </div>

    <script>
        let allWords = JSON.parse(localStorage.getItem('myWords')) || [];
        let isFilterMode = false; // 只看星號模式
        let selectedCategory = "all"; // 當前選取的分類
        let displayList = [];
        let currentIndex = 0;
        let jpVoice = null;

        function loadVoices() {
            jpVoice = window.speechSynthesis.getVoices().find(v => v.lang.includes('ja'));
        }
        window.speechSynthesis.onvoiceschanged = loadVoices;
        loadVoices();

        function flipCard() { document.getElementById('flashcard').classList.toggle('flipped'); }

        // 更新分類選單與輸入提示
        function updateCategoryUI() {
            const filterSelect = document.getElementById('catFilter');
            const catHistory = document.getElementById('cat-history');
            const categories = [...new Set(allWords.map(w => w.cat || "未分類"))];
            
            // 更新下拉篩選選單
            filterSelect.innerHTML = '<option value="all">📁 顯示所有分類</option>';
            categories.forEach(cat => {
                const opt = document.createElement('option');
                opt.value = cat;
                opt.innerText = `📁 ${cat}`;
                filterSelect.appendChild(opt);
            });
            filterSelect.value = selectedCategory;

            // 更新輸入提示
            catHistory.innerHTML = '';
            categories.forEach(cat => {
                const opt = document.createElement('option');
                opt.value = cat;
                catHistory.appendChild(opt);
            });
        }

        // 核心邏輯：決定現在要顯示哪些單字
        function updateDisplayList() {
            // 1. 先過濾分類
            let filtered = selectedCategory === "all" 
                ? allWords 
                : allWords.filter(w => (w.cat || "未分類") === selectedCategory);
            
            // 2. 再過濾星號
            if (isFilterMode) {
                filtered = filtered.filter(w => w.isHard);
            }

            displayList = filtered;
            if (currentIndex >= displayList.length) currentIndex = 0;
            render();
            updateCategoryUI();
        }

        function addWord() {
            const cat = document.getElementById('catInput').value.trim() || "未分類";
            const jp = document.getElementById('jpInput').value.trim();
            const cn = document.getElementById('cnInput').value.trim();
            
            if (jp && cn) {
                allWords.push({ jp, cn, cat, isHard: false, id: Date.now() });
                save();
                selectedCategory = cat; // 自動切換到剛新增的分類
                currentIndex = allWords.filter(w => w.cat === cat).length - 1;
                updateDisplayList();
                speakWord();
                document.getElementById('jpInput').value = '';
                document.getElementById('cnInput').value = '';
            }
        }

        function changeCategoryFilter() {
            selectedCategory = document.getElementById('catFilter').value;
            currentIndex = 0;
            updateDisplayList();
        }

        function toggleFilter() {
            isFilterMode = !isFilterMode;
            document.getElementById('filterBtn').className = isFilterMode ? "btn btn-sm is-hard" : "btn btn-sm";
            currentIndex = 0;
            updateDisplayList();
        }

        function shuffleWords() {
            displayList.sort(() => Math.random() - 0.5);
            currentIndex = 0;
            render();
        }

        function render() {
            const counter = document.getElementById('counter');
            const wordDisp = document.getElementById('word-display');
            const meanDisp = document.getElementById('meaning-display');
            const catDisp = document.getElementById('cat-display');
            const pinBtn = document.getElementById('pinBtn');
            
            counter.innerText = `數量: ${displayList.length}`;

            if (displayList.length === 0) {
                wordDisp.innerText = isFilterMode ? "此分類無標記" : "分類空空如也";
                meanDisp.innerText = "請新增單字";
                catDisp.innerText = "-";
                pinBtn.style.display = "none";
                return;
            }

            pinBtn.style.display = "block";
            const current = displayList[currentIndex];
            wordDisp.innerText = current.jp;
            meanDisp.innerText = current.cn;
            catDisp.innerText = current.cat || "未分類";
            pinBtn.innerText = current.isHard ? "🌟 已標記不懂" : "⭐ 標記為不懂";
            pinBtn.className = current.isHard ? "btn full is-hard" : "btn full";
            document.getElementById('flashcard').classList.remove('flipped');
        }

        function speakWord(e) {
            if (e) e.stopPropagation();
            if (displayList.length > 0) {
                window.speechSynthesis.cancel();
                const utter = new SpeechSynthesisUtterance(displayList[currentIndex].jp);
                if (jpVoice) utter.voice = jpVoice;
                utter.lang = 'ja-JP';
                utter.rate = 0.85;
                window.speechSynthesis.speak(utter);
            }
        }

        function deleteWord(e) {
            e.stopPropagation();
            if (displayList.length === 0) return;
            if (confirm("確定刪除此單字？")) {
                const targetId = displayList[currentIndex].id;
                allWords = allWords.filter(w => w.id !== targetId);
                save();
                updateDisplayList();
            }
        }

        function togglePin(e) {
            e.stopPropagation();
            const current = displayList[currentIndex];
            current.isHard = !current.isHard;
            save();
            render();
        }

        function save() { localStorage.setItem('myWords', JSON.stringify(allWords)); }
        function nextWord(e) { e.stopPropagation(); if(displayList.length > 0) { currentIndex = (currentIndex + 1) % displayList.length; render(); } }
        function prevWord(e) { e.stopPropagation(); if(displayList.length > 0) { currentIndex = (currentIndex - 1 + displayList.length) % displayList.length; render(); } }

        function exportData() {
            const blob = new Blob([JSON.stringify(allWords)], {type: "text/plain"});
            const a = document.createElement("a");
            a.href = URL.createObjectURL(blob);
            a.download = "jp_backup.txt";
            a.click();
        }

        function importData() {
            const input = document.createElement("input");
            input.type = "file";
            input.onchange = e => {
                const reader = new FileReader();
                reader.onload = event => {
                    allWords = JSON.parse(event.target.result);
                    save();
                    location.reload();
                };
                reader.readAsText(e.target.files[0]);
            };
            input.click();
        }
        
        updateDisplayList();
    </script>
</body>
</html>
