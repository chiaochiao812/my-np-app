<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>日文單字 App - 置中優化版</title>
    <style>
        :root { --primary: #007bff; --danger: #ff4757; --warning: #ffa502; --success: #2ed573; --bg: #f8f9fa; }
        
        /* 讓身體撐滿全螢幕，不產生滾動條 */
        body { 
            font-family: -apple-system, sans-serif; 
            background: var(--bg); 
            margin: 0; 
            padding: 0; 
            height: 100vh; 
            width: 100vw;
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            overflow: hidden; 
            box-sizing: border-box;
        }

        .app-container { 
            width: 92%; 
            max-width: 400px; 
            height: 100%;
            display: flex; 
            flex-direction: column; 
        }
        
        /* 頂部區域 */
        .header-section { padding-top: 15px; width: 100%; }
        .mode-tabs { display: flex; gap: 8px; margin-bottom: 10px; }
        .tab-btn { flex: 1; padding: 10px; border: none; border-radius: 10px; background: #e2e8f0; color: #4a5568; font-weight: bold; cursor: pointer; font-size: 13px; }
        .tab-btn.active { background: var(--primary); color: white; }
        .top-bar { width: 100%; margin-bottom: 5px; }
        select { width: 100%; padding: 12px; border-radius: 12px; border: 2px solid var(--primary); font-size: 15px; background: white; outline: none; }
        .stats-row { display: flex; justify-content: space-between; align-items: center; font-size: 11px; color: #a4b0be; padding: 4px; }

        /* --- 單字卡區域：利用 flex-grow 實現垂直置中 --- */
        .card-area { 
            flex-grow: 1; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; /* 讓內容在正中央 */
            width: 100%;
        }

        .card { width: 100%; height: 230px; perspective: 1000px; }
        .card-inner { position: relative; width: 100%; height: 100%; transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); transform-style: preserve-3d; }
        .card.flipped .card-inner { transform: rotateY(180deg); }
        .card-front, .card-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; flex-direction: column; justify-content: center; align-items: center; border-radius: 25px; background: white; box-shadow: 0 8px 20px rgba(0,0,0,0.06); border: 1px solid #eee; }
        .card-back { transform: rotateY(180deg); background: #f0f7ff; color: var(--primary); }
        
        #word-display { font-size: 2.6rem; font-weight: bold; color: #2f3542; text-align: center; }
        #meaning-display { font-size: 2.2rem; text-align: center; }
        .cat-tag { position: absolute; top: 15px; left: 20px; font-size: 11px; color: #bdc3c7; }
        .star-btn { position: absolute; top: 12px; right: 15px; font-size: 28px; color: #eee; background: none; border: none; cursor: pointer; }
        .star-btn.active { color: var(--warning); }

        /* 導覽按鈕緊跟在單字下方 */
        .nav-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 100%; margin-top: 15px; }
        .nav-btn { background: white; border: 1px solid #e0e0e0; padding: 15px; border-radius: 15px; font-size: 24px; cursor: pointer; box-shadow: 0 4px 8px rgba(0,0,0,0.03); }

        /* --- 底部控制區：往上抬升 --- */
        .bottom-section { 
            width: 100%; 
            display: flex; 
            flex-direction: column; 
            padding-bottom: 110px; /* 大幅增加底部墊高，讓按鈕浮上來 */
        } 
        
        .action-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 15px; } 
        .btn-sub { font-size: 14px; background: #f1f2f6; color: #57606f; font-weight: 600; padding: 12px; border: none; border-radius: 12px; cursor: pointer; }
        .admin-toggle { width: 100%; background: #dfe4ea; border: none; padding: 15px; border-radius: 12px; color: #2f3542; font-weight: bold; cursor: pointer; font-size: 14px; }

        /* 挑戰模式 */
        .quiz-box { background: white; width: 100%; padding: 30px 15px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); text-align: center; box-sizing: border-box;}

        /* 管理面板 */
        .admin-panel { display: none; background: white; padding: 20px; border-radius: 25px 25px 0 0; box-shadow: 0 -10px 40px rgba(0,0,0,0.15); flex-direction: column; position: fixed; bottom: 0; left: 0; right: 0; z-index: 100; border-top: 4px solid var(--primary); }
        .admin-panel.active { display: flex; }
        .admin-panel input { margin-bottom: 10px; padding: 14px; border: 1px solid #ddd; border-radius: 10px; font-size: 16px; outline: none; }
        .util-row { display: flex; gap: 8px; margin: 15px 0; } 
        .btn-util { background: #7f8c8d; font-size: 12px; flex: 1; border: none; border-radius: 10px; padding: 12px; color: white; font-weight: bold; cursor: pointer; }
        .btn-main { width: 100%; border: none; border-radius: 12px; padding: 15px; font-weight: bold; color: white; cursor: pointer; font-size: 16px; background: var(--primary); }
        
        .overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 90; }
        .overlay.active { display: block; }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="header-section">
            <div class="mode-tabs">
                <button id="tab-study" class="tab-btn active" onclick="switchMode('study')">📖 學習模式</button>
                <button id="tab-quiz" class="tab-btn" onclick="switchMode('quiz')">🎯 挑戰模式</button>
            </div>
            <div class="top-bar">
                <select id="catFilter" onchange="changeCategoryFilter()">
                    <option value="all">📁 全部單字</option>
                    <option value="favorites">⭐ 已收藏單字</option>
                </select>
                <div class="stats-row">
                    <span id="counter">0 / 0</span>
                    <span id="mode-text">閱讀中：全部</span>
                </div>
            </div>
        </div>

        <div id="study-view" class="card-area">
            <div class="card" id="flashcard" onclick="flipCard()">
                <div class="card-inner">
                    <div class="card-front">
                        <span id="cat-display" class="cat-tag">未分類</span>
                        <button id="starBtn" class="star-btn" onclick="togglePin(event)">★</button>
                        <div id="word-display">尚未新增</div>
                        <button style="margin-top:25px; border:none; background:#f1f2f6; padding:8px 20px; border-radius:20px; font-size:12px; font-weight:bold; color:#57606f;" onclick="speakWord(event)">🔊 語音</button>
                    </div>
                    <div class="card-back">
                        <div id="meaning-display">意思</div>
                    </div>
                </div>
            </div>
            
            <div id="nav-arrows" class="nav-row">
                <button class="nav-btn" onclick="prevWord()">⬅️</button>
                <button class="nav-btn" onclick="nextWord()">➡️</button>
            </div>
        </div>

        <div id="quiz-view" class="card-area" style="display:none;">
            <div class="quiz-box">
                <div id="quiz-jp" style="font-size: 2.8rem; font-weight: bold;">?</div>
                <div id="quiz-ans-area" style="font-size: 22px; color: var(--success); margin-top: 15px; min-height: 30px; font-weight: bold;"></div>
            </div>
            <div class="nav-row">
                <button class="nav-btn" style="background: #e2e8f0; font-size: 16px;" onclick="showQuizAnswer()">👁️ 答案</button>
                <button class="nav-btn" style="background: var(--success); color: white; font-size: 16px;" onclick="nextQuiz()">下一個</button>
            </div>
        </div>

        <div class="bottom-section">
            <div id="edit-actions" class="action-row">
                <button class="btn-sub" onclick="startEdit()">✏️ 修正單字</button>
                <button class="btn-sub" style="color:var(--danger)" onclick="deleteWord()">🗑️ 刪除單字</button>
            </div>
            <button class="admin-toggle" onclick="toggleAdmin()">⚙️ 管理 / 新增單字 / 備份</button>
        </div>
    </div>

    <div class="overlay" id="overlay" onclick="closeAdmin()"></div>
    <div id="adminPanel" class="admin-panel">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
            <b id="panelTitle">新增單字</b>
            <button onclick="closeAdmin()" style="background:none; border:none; font-size:28px; color:#ccc;">✕</button>
        </div>
        <input type="text" id="catInput" placeholder="分類 (例如: N5)" list="cat-history">
        <datalist id="cat-history"></datalist>
        <input type="text" id="jpInput" placeholder="日文單字">
        <input type="text" id="cnInput" placeholder="中文意思">
        <div class="util-row">
            <button class="btn-util" onclick="shuffleWords()">🔀 亂序</button>
            <button class="btn-util" onclick="exportData()">💾 備份</button>
            <button class="btn-util" onclick="importData()">📂 匯入</button>
        </div>
        <div id="buttonArea">
            <button id="addBtn" class="btn-main" onclick="addWord()">➕ 加入單字本</button>
            <div id="editBtns" style="display:none; gap:10px;">
                <button class="btn-main" style="background:var(--success); flex:2" onclick="saveEdit()">💾 儲存修改</button>
                <button class="btn-main" style="background:#95a5a6; flex:1" onclick="cancelEdit()">取消</button>
            </div>
        </div>
    </div>

    <script>
        // 核心邏輯 (不變)
        let allWords = [];
        try { allWords = JSON.parse(localStorage.getItem('myWords')) || []; } catch(e) { allWords = []; }
        let selectedCategory = "all", displayList = [], currentIndex = 0, editTargetId = null;
        let currentMode = 'study';

        function switchMode(mode) {
            currentMode = mode;
            document.getElementById('study-view').style.display = (mode === 'study') ? 'flex' : 'none';
            document.getElementById('quiz-view').style.display = (mode === 'quiz') ? 'flex' : 'none';
            document.getElementById('edit-actions').style.display = (mode === 'study') ? 'grid' : 'none';
            document.getElementById('tab-study').classList.toggle('active', mode === 'study');
            document.getElementById('tab-quiz').classList.toggle('active', mode === 'quiz');
            if (mode === 'quiz') nextQuiz(); else render();
        }

        function toggleAdmin() { document.getElementById('adminPanel').classList.add('active'); document.getElementById('overlay').classList.add('active'); }
        function closeAdmin() { document.getElementById('adminPanel').classList.remove('active'); document.getElementById('overlay').classList.remove('active'); cancelEdit(); }

        function nextQuiz() {
            if (displayList.length === 0) { document.getElementById('quiz-jp').innerText = "請先新增"; return; }
            currentIndex = Math.floor(Math.random() * displayList.length);
            document.getElementById('quiz-jp').innerText = displayList[currentIndex].jp;
            document.getElementById('quiz-ans-area').innerText = "";
            render();
        }

        function showQuizAnswer() {
            if (displayList.length > 0) {
                document.getElementById('quiz-ans-area').innerText = displayList[currentIndex].cn;
                speakWord();
            }
        }

        function speakWord(e) {
            if (e) e.stopPropagation();
            if (displayList.length === 0) return;
            window.speechSynthesis.cancel();
            const utter = new SpeechSynthesisUtterance(displayList[currentIndex].jp);
            utter.lang = 'ja-JP'; utter.rate = 0.85; window.speechSynthesis.speak(utter);
        }

        function flipCard() { document.getElementById('flashcard').classList.toggle('flipped'); }

        function updateDisplayList() {
            if (selectedCategory === "all") { displayList = allWords; } 
            else if (selectedCategory === "favorites") { displayList = allWords.filter(w => w.isHard); } 
            else { displayList = allWords.filter(w => (w.cat || "未分類") === selectedCategory); }
            if (currentIndex >= displayList.length) currentIndex = 0;
            updateCategoryUI(); render();
        }

        function updateCategoryUI() {
            const filter = document.getElementById('catFilter');
            const history = document.getElementById('cat-history');
            const cats = [...new Set(allWords.map(w => w.cat || "未分類"))];
            let html = '<option value="all">📁 全部單字</option><option value="favorites">⭐ 已收藏</option><option disabled>───</option>';
            cats.forEach(c => { html += `<option value="${c}">📁 ${c}</option>`; });
            filter.innerHTML = html; filter.value = selectedCategory;
            history.innerHTML = cats.map(c => `<option value="${c}">`).join('');
        }

        function render() {
            const counter = document.getElementById('counter'), wordDisp = document.getElementById('word-display'), 
                  meanDisp = document.getElementById('meaning-display'), catDisp = document.getElementById('cat-display'),
                  starBtn = document.getElementById('starBtn');
            counter.innerText = displayList.length > 0 ? `${currentIndex + 1} / ${displayList.length}` : "0 / 0";
            if (displayList.length === 0) { wordDisp.innerText = "空"; meanDisp.innerText = ""; return; }
            const current = displayList[currentIndex];
            wordDisp.innerText = current.jp; meanDisp.innerText = current.cn;
            catDisp.innerText = current.cat || "未分類";
            starBtn.classList.toggle('active', current.isHard);
            document.getElementById('flashcard').classList.remove('flipped');
        }

        function addWord() {
            const jp = document.getElementById('jpInput').value.trim();
            const cn = document.getElementById('cnInput').value.trim();
            const cat = document.getElementById('catInput').value.trim() || "未分類";
            if (jp && cn) {
                allWords.push({ jp, cn, cat, isHard: false, id: Date.now() });
                save(); updateDisplayList();
                document.getElementById('jpInput').value = ''; document.getElementById('cnInput').value = ''; closeAdmin();
            }
        }

        function save() { localStorage.setItem('myWords', JSON.stringify(allWords)); }
        function nextWord() { if(displayList.length > 0) { currentIndex = (currentIndex + 1) % displayList.length; render(); } }
        function prevWord() { if(displayList.length > 0) { currentIndex = (currentIndex - 1 + displayList.length) % displayList.length; render(); } }
        function togglePin(e) { e.stopPropagation(); displayList[currentIndex].isHard = !displayList[currentIndex].isHard; save(); render(); }
        function changeCategoryFilter() { selectedCategory = document.getElementById('catFilter').value; currentIndex = 0; updateDisplayList(); }
        function shuffleWords() { allWords.sort(() => Math.random() - 0.5); save(); updateDisplayList(); closeAdmin(); }
        function exportData() { const a = document.createElement("a"); a.href = URL.createObjectURL(new Blob([JSON.stringify(allWords)], {type: "text/plain"})); a.download = "jp_backup.txt"; a.click(); }
        function importData() { const i = document.createElement("input"); i.type = "file"; i.onchange = e => { const r = new FileReader(); r.onload = ev => { try { allWords = JSON.parse(ev.target.result); save(); location.reload(); } catch(err) { alert("格式錯誤"); } }; r.readAsText(e.target.files[0]); }; i.click(); }
        function deleteWord() { if (displayList.length > 0 && confirm("確定刪除此單字？")) { allWords = allWords.filter(w => w.id !== displayList[currentIndex].id); save(); updateDisplayList(); } }
        function startEdit() {
            if (displayList.length === 0) return;
            const current = displayList[currentIndex];
            editTargetId = current.id;
            document.getElementById('catInput').value = current.cat || "未分類";
            document.getElementById('jpInput').value = current.jp;
            document.getElementById('cnInput').value = current.cn;
            document.getElementById('panelTitle').innerText = "✏️ 修正內容";
            document.getElementById('addBtn').style.display = 'none';
            document.getElementById('editBtns').style.display = 'flex';
            toggleAdmin();
        }
        function saveEdit() {
            const idx = allWords.findIndex(w => w.id === editTargetId);
            if (idx !== -1) {
                allWords[idx].cat = document.getElementById('catInput').value.trim() || "未分類";
                allWords[idx].jp = document.getElementById('jpInput').value.trim();
                allWords[idx].cn = document.getElementById('cnInput').value.trim();
                save(); updateDisplayList(); closeAdmin();
            }
        }
        function cancelEdit() {
            editTargetId = null;
            document.getElementById('panelTitle').innerText = "新增單字";
            document.getElementById('addBtn').style.display = 'block';
            document.getElementById('editBtns').style.display = 'none';
            document.getElementById('catInput').value = ''; document.getElementById('jpInput').value = ''; document.getElementById('cnInput').value = '';
        }

        updateDisplayList();
    </script>
</body>
</html>
