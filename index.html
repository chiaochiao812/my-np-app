<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>日文單字 App</title>
    <style>
        :root { --primary: #007bff; --danger: #ff4757; --warning: #ffa502; --success: #2ed573; --bg: #f8f9fa; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        .app-container { width: 100%; max-width: 400px; }
        
        /* 頂部導覽 */
        .top-bar { width: 100%; display: flex; flex-direction: column; gap: 8px; margin-bottom: 10px; }
        select { width: 100%; padding: 14px; border-radius: 15px; border: 2px solid var(--primary); font-size: 16px; font-weight: bold; background: white; outline: none; -webkit-appearance: none; }
        .stats-row { display: flex; justify-content: space-between; align-items: center; font-size: 13px; color: #7f8c8d; padding: 0 5px; margin-top: 5px; }

        /* 管理面板 */
        .admin-toggle { width: 100%; background: #ecedf0; border: none; padding: 12px; border-radius: 12px; color: #2f3542; font-weight: bold; margin-top: 10px; cursor: pointer; }
        .admin-panel { display: none; background: white; padding: 18px; border-radius: 20px; box-shadow: 0 5px 20px rgba(0,0,0,0.08); margin-top: 12px; flex-direction: column; gap: 10px; border: 2px solid transparent; }
        .admin-panel.active { display: flex; }
        .editing { border-color: var(--warning); background: #fffef5; }
        
        input { padding: 12px; border: 1px solid #ddd; border-radius: 10px; font-size: 16px; outline: none; -webkit-appearance: none; }
        .btn-group { display: flex; gap: 8px; }
        .btn { border: none; border-radius: 10px; padding: 12px; font-weight: bold; color: white; flex: 1; cursor: pointer; text-align: center; }
        .btn-add { background: var(--primary); }
        .btn-save { background: var(--success); }
        .btn-cancel { background: #95a5a6; }

        /* 閃卡區域 */
        .card { width: 100%; height: 260px; perspective: 1000px; margin: 15px 0; }
        .card-inner { position: relative; width: 100%; height: 100%; transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); transform-style: preserve-3d; }
        .card.flipped .card-inner { transform: rotateY(180deg); }
        .card-front, .card-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; flex-direction: column; justify-content: center; align-items: center; border-radius: 30px; background: white; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .card-back { transform: rotateY(180deg); background: #f0f7ff; color: var(--primary); }
        
        #word-display { font-size: 2.6rem; font-weight: bold; color: #2f3542; text-align: center; width: 90%; line-height: 1.2; }
        #meaning-display { font-size: 2rem; text-align: center; }
        .cat-tag { position: absolute; top: 20px; left: 25px; font-size: 12px; color: #bdc3c7; font-weight: bold; }
        .fav-status { position: absolute; top: 20px; right: 55px; font-size: 11px; color: var(--warning); font-weight: bold; display: none; }
        .star-btn { position: absolute; top: 12px; right: 20px; font-size: 30px; color: #eee; background: none; border: none; padding: 5px; cursor: pointer; }
        .star-btn.active { color: var(--warning); }

        /* 導覽 */
        .nav-controls { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; width: 100%; margin-top: 10px; }
        .nav-btn { background: #ffffff; border: 1px solid #f0f0f0; padding: 16px; border-radius: 18px; font-size: 22px; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.02); }
        .btn-sub { font-size: 14px; background: #f8f9fa; color: #7f8c8d; font-weight: bold; }
        .btn-del { color: var(--danger); }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="top-bar">
            <select id="catFilter" onchange="changeCategoryFilter()">
                <option value="all">📁 全部單字</option>
                <option value="favorites">⭐ 已收藏單字</option>
            </select>
            
            <div class="stats-row">
                <span id="counter">0 / 0</span>
                <span id="mode-text">正在背誦：全部</span>
            </div>
            
            <button class="admin-toggle" id="adminToggleBtn" onclick="toggleAdmin()">⚙️ 管理 / 新增單字</button>
            <div id="adminPanel" class="admin-panel">
                <b id="panelTitle">新增單字</b>
                <input type="text" id="catInput" placeholder="分類 (不填即為 未分類)" list="cat-history">
                <datalist id="cat-history"></datalist>
                <input type="text" id="jpInput" placeholder="輸入日文">
                <input type="text" id="cnInput" placeholder="輸入中文意思">
                
                <div id="addBtns">
                    <button class="btn btn-add" style="width:100%" onclick="addWord()">➕ 加入單字本</button>
                </div>
                <div id="editBtns" style="display:none;" class="btn-group">
                    <button class="btn btn-save" onclick="saveEdit()">💾 儲存修改</button>
                    <button class="btn btn-cancel" onclick="cancelEdit()">取消</button>
                </div>
                
                <div style="display:flex; gap:5px; margin-top:8px;">
                    <button class="btn" style="background:#7f8c8d; font-size:11px;" onclick="shuffleWords()">🔀 隨機亂序</button>
                    <button class="btn" style="background:#7f8c8d; font-size:11px;" onclick="exportData()">💾 備份</button>
                    <button class="btn" style="background:#7f8c8d; font-size:11px;" onclick="importData()">📂 匯入</button>
                </div>
            </div>
        </div>

        <div class="card" id="flashcard" onclick="flipCard()">
            <div class="card-inner">
                <div class="card-front">
                    <span id="cat-display" class="cat-tag">未分類</span>
                    <span id="fav-label" class="fav-status">已收藏</span>
                    <button id="starBtn" class="star-btn" onclick="togglePin(event)">★</button>
                    <div id="word-display">尚未新增</div>
                    <button style="margin-top:35px; border:none; background:#f1f2f6; padding:12px 25px; border-radius:25px; font-size:14px; font-weight:bold; color:#57606f;" onclick="speakWord(event)">🔊 聽日文發音</button>
                </div>
                <div class="card-back">
                    <div id="meaning-display">意思</div>
                </div>
            </div>
        </div>

        <div class="nav-controls">
            <button class="nav-btn" onclick="prevWord()">⬅️</button>
            <button class="nav-btn" onclick="nextWord()">➡️</button>
            <button class="nav-btn btn-sub" onclick="startEdit()">✏️ 修正單字/分類</button>
            <button class="nav-btn btn-sub btn-del" onclick="deleteWord()">🗑️ 刪除</button>
        </div>
    </div>

    <script>
        // 確保資料正確初始化
        let allWords = [];
        try {
            allWords = JSON.parse(localStorage.getItem('myWords')) || [];
        } catch(e) {
            allWords = [];
        }

        let selectedCategory = "all", displayList = [], currentIndex = 0, editTargetId = null;

        // --- 強制日文發音邏輯 ---
        let jpVoice = null;
        function findJpVoice() {
            const voices = window.speechSynthesis.getVoices();
            jpVoice = voices.find(v => v.lang.toLowerCase().includes('ja')) || voices.find(v => v.lang === 'ja-JP');
        }
        if (speechSynthesis.onvoiceschanged !== undefined) {
            speechSynthesis.onvoiceschanged = findJpVoice;
        }
        findJpVoice();

        function speakWord(e) {
            if (e) e.stopPropagation();
            if (displayList.length === 0) return;
            window.speechSynthesis.cancel();
            const utter = new SpeechSynthesisUtterance(displayList[currentIndex].jp);
            if (jpVoice) utter.voice = jpVoice;
            utter.lang = 'ja-JP';
            utter.rate = 0.85;
            window.speechSynthesis.speak(utter);
        }

        // --- 管理面板開關 ---
        function toggleAdmin() {
            const panel = document.getElementById('adminPanel');
            panel.classList.toggle('active');
        }

        function flipCard() {
            document.getElementById('flashcard').classList.toggle('flipped');
        }

        function updateDisplayList() {
            if (selectedCategory === "all") {
                displayList = allWords;
                document.getElementById('mode-text').innerText = "正在閱讀：全部單字";
            } else if (selectedCategory === "favorites") {
                displayList = allWords.filter(w => w.isHard);
                document.getElementById('mode-text').innerText = "正在閱讀：⭐ 已收藏";
            } else {
                displayList = allWords.filter(w => (w.cat || "未分類") === selectedCategory);
                document.getElementById('mode-text').innerText = `正在閱讀：📁 ${selectedCategory}`;
            }
            if (currentIndex >= displayList.length) currentIndex = 0;
            updateCategoryUI();
            render();
        }

        function updateCategoryUI() {
            const filter = document.getElementById('catFilter');
            const history = document.getElementById('cat-history');
            const cats = [...new Set(allWords.map(w => w.cat || "未分類"))];
            
            let html = '<option value="all">📁 全部單字</option><option value="favorites">⭐ 已收藏單字</option><option disabled>──────────</option>';
            cats.forEach(c => { html += `<option value="${c}">📁 ${c}</option>`; });
            
            filter.innerHTML = html;
            filter.value = selectedCategory;
            history.innerHTML = cats.map(c => `<option value="${c}">`).join('');
        }

        function addWord() {
            const cat = document.getElementById('catInput').value.trim() || "未分類";
            const jp = document.getElementById('jpInput').value.trim();
            const cn = document.getElementById('cnInput').value.trim();
            if (jp && cn) {
                allWords.push({ jp, cn, cat, isHard: false, id: Date.now() });
                save();
                selectedCategory = cat;
                updateDisplayList();
                currentIndex = displayList.length - 1;
                render();
                speakWord();
                document.getElementById('jpInput').value = ''; 
                document.getElementById('cnInput').value = '';
                toggleAdmin();
            }
        }

        function startEdit() {
            if (displayList.length === 0) return;
            const current = displayList[currentIndex];
            editTargetId = current.id;
            document.getElementById('catInput').value = current.cat || "未分類";
            document.getElementById('jpInput').value = current.jp;
            document.getElementById('cnInput').value = current.cn;
            
            document.getElementById('panelTitle').innerText = "✏️ 修改中...";
            document.getElementById('addBtns').style.display = 'none';
            document.getElementById('editBtns').style.display = 'flex';
            document.getElementById('adminPanel').classList.add('active', 'editing');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function saveEdit() {
            const idx = allWords.findIndex(w => w.id === editTargetId);
            if (idx !== -1) {
                allWords[idx].cat = document.getElementById('catInput').value.trim() || "未分類";
                allWords[idx].jp = document.getElementById('jpInput').value.trim();
                allWords[idx].cn = document.getElementById('cnInput').value.trim();
                save(); cancelEdit(); updateDisplayList(); 
                if(document.getElementById('adminPanel').classList.contains('active')) toggleAdmin();
            }
        }

        function cancelEdit() {
            editTargetId = null;
            document.getElementById('panelTitle').innerText = "新增單字";
            document.getElementById('addBtns').style.display = 'block';
            document.getElementById('editBtns').style.display = 'none';
            document.getElementById('adminPanel').classList.remove('editing');
            document.getElementById('catInput').value = ''; 
            document.getElementById('jpInput').value = ''; 
            document.getElementById('cnInput').value = '';
        }

        function render() {
            const counter = document.getElementById('counter'), wordDisp = document.getElementById('word-display'), 
                  meanDisp = document.getElementById('meaning-display'), catDisp = document.getElementById('cat-display'),
                  starBtn = document.getElementById('starBtn'), favLabel = document.getElementById('fav-label');
            
            counter.innerText = displayList.length > 0 ? `${currentIndex + 1} / ${displayList.length}` : "0 / 0";
            
            if (displayList.length === 0) {
                wordDisp.innerText = selectedCategory === 'favorites' ? "目前無收藏" : "尚未新增";
                meanDisp.innerText = ""; catDisp.innerText = "-"; favLabel.style.display = "none";
                starBtn.classList.remove('active'); return;
            }
            const current = displayList[currentIndex];
            wordDisp.innerText = current.jp; 
            meanDisp.innerText = current.cn;
            catDisp.innerText = current.cat || "未分類";
            
            if (current.isHard) {
                starBtn.classList.add('active');
                favLabel.style.display = "block";
            } else {
                starBtn.classList.remove('active');
                favLabel.style.display = "none";
            }
            document.getElementById('flashcard').classList.remove('flipped');
        }

        function deleteWord() {
            if (displayList.length > 0 && confirm("確定刪除此單字？")) {
                allWords = allWords.filter(w => w.id !== displayList[currentIndex].id);
                save(); updateDisplayList();
            }
        }

        function togglePin(e) {
            e.stopPropagation();
            const current = displayList[currentIndex];
            current.isHard = !current.isHard;
            save(); 
            if (selectedCategory === 'favorites') updateDisplayList();
            else render();
        }

        function changeCategoryFilter() { selectedCategory = document.getElementById('catFilter').value; currentIndex = 0; updateDisplayList(); }
        function shuffleWords() { displayList.sort(() => Math.random() - 0.5); currentIndex = 0; render(); toggleAdmin(); }
        function save() { localStorage.setItem('myWords', JSON.stringify(allWords)); }
        function nextWord() { if(displayList.length > 0) { currentIndex = (currentIndex + 1) % displayList.length; render(); } }
        function prevWord() { if(displayList.length > 0) { currentIndex = (currentIndex - 1 + displayList.length) % displayList.length; render(); } }
        
        function exportData() { const a = document.createElement("a"); a.href = URL.createObjectURL(new Blob([JSON.stringify(allWords)], {type: "text/plain"})); a.download = "jp_backup.txt"; a.click(); }
        function importData() { 
            const i = document.createElement("input"); i.type = "file"; 
            i.onchange = e => { 
                const r = new FileReader(); 
                r.onload = ev => { 
                    try {
                        allWords = JSON.parse(ev.target.result); save(); location.reload(); 
                    } catch(err) { alert("匯入格式有誤"); }
                }; 
                r.readAsText(e.target.files[0]); 
            }; 
            i.click(); 
        }
        
        // 初始執行
        updateDisplayList();
    </script>
</body>
</html>
