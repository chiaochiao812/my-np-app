<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="日文單字">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/197/197604.png">
    <link rel="manifest" href="data:application/json;base64,ewogICJuYW1lIjogIuaXpaWhruWlluWtl+acrSIsCiAgInNob3J0X25hbWUiIjogIuaXpaWhruWlluWtlSIsCiAgInN0YXJ0X3VybCI6ICJpbmRleC5odG1sIiwKICAiZGlzcGxheSI6ICJzdGFuZGFsb25lIiwKICAiYmFja2dyb3VuZF9jb2xvciI6ICIjZmZmZmZmIiwKICAidGhlbWVfY29sb3IiIjogIiMwMDdiZmYiCn0=">
    <title>日文單字 App</title>
    <style>
        :root { --primary: #007bff; --danger: #dc3545; --warning: #ffc107; --bg: #f4f7f9; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; min-height: 100vh; }
        .app-container { width: 100%; max-width: 400px; display: flex; flex-direction: column; }
        h2 { text-align: center; color: #333; margin: 10px 0; }
        
        .section { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 15px; }
        .input-group { display: flex; flex-direction: column; gap: 8px; }
        input, select { padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; outline: none; background: white; }
        
        .btn { padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 15px; text-align: center; color: white; background: var(--primary); }
        .btn-sm { padding: 6px 12px; font-size: 13px; background: #6c757d; }
        
        /* 篩選與分類列 */
        .filter-bar { display: flex; flex-direction: column; gap: 10px; margin-bottom: 15px; }
        .filter-row { display: flex; justify-content: space-between; align-items: center; }
        #catFilter { width: 100%; margin-top: 5px; border-color: var(--primary); font-weight: bold; }

        .card { width: 100%; height: 200px; perspective: 1000px; margin-bottom: 15px; }
        .card-inner { position: relative; width: 100%; height: 100%; transition: transform 0.6s; transform-style: preserve-3d; }
        .card.flipped .card-inner { transform: rotateY(180deg); }
        .card-front, .card-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; flex-direction: column; justify-content: center; align-items: center; border-radius: 20px; background: white; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .card-front { border: 2px solid var(--primary); }
        .card-back { background: #e7f3ff; transform: rotateY(180deg); color: #0056b3; font-size: 1.6rem; text-align: center; padding: 10px; }
        
        #word-display { font-size: 2.2rem; font-weight: bold; }
        .cat-tag { position: absolute; top: 10px; right: 15px; font-size: 12px; background: #eee; padding: 2px 8px; border-radius: 10px; color: #666; }
        
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .full { grid-column: span 2; }
        .del-btn { background: var(--danger); font-size: 13px; margin-top: 5px; opacity: 0.8; }
        .is-hard { background: var(--warning) !important; color: #333 !important; }
        
        .backup-section { margin-top: 20px; display: flex; justify-content: center; gap: 20px; border-top: 1px solid #ddd; padding-top: 15px; }
        .backup-btn { background: transparent; color: #999; border: 1px solid #ccc; font-size: 11px; padding: 5px 8px; }
    </style>
</head>
<body>
    <div class="app-container">
        <h2>🇯🇵 日文分類單字本</h2>
        
        <div class="section input-group">
            <input type="text" id="catInput" placeholder="分類 (如: 第一課, 動詞, 數字)" list="cat-history">
            <datalist id="cat-history"></datalist>
            <input type="text" id="jpInput" placeholder="輸入日文">
            <input type="text" id="cnInput" placeholder="輸入中文意思">
            <button class="btn" onclick="addWord()">➕ 新增到單字本</button>
        </div>

        <div class="section" style="padding: 10px;">
            <div class="filter-row">
                <span id="counter" style="font-size:14px; color:#666;">數量: 0</span>
                <button id="filterBtn" class="btn btn-sm" onclick="toggleFilter()">🎯 只看不懂</button>
            </div>
            <select id="catFilter" onchange="changeCategoryFilter()">
                <option value="all">📁 顯示所有分類</option>
            </select>
            <div style="margin-top:8px; display:flex; gap:5px;">
                <button class="btn btn-sm" style="flex:1" onclick="shuffleWords()">🔀 亂序</button>
            </div>
        </div>

        <div class="card" id="flashcard" onclick="flipCard()">
            <div class="card-inner">
                <div class="card-front">
                    <div id="cat-display" class="cat-tag">分類</div>
                    <div id="word-display">尚未新增</div>
                    <button class="btn btn-sm" style="margin-top:10px" onclick="speakWord(event)">🔊 發音</button>
                </div>
                <div class="card-back" id="meaning-display">意思</div>
            </div>
        </div>

        <div class="controls">
            <button class="btn" onclick="prevWord(event)">⬅️ 上一個</button>
            <button class="btn" onclick="nextWord(event)">➡️ 下一個</button>
            <button id="pinBtn" class="btn full" onclick="togglePin(event)">⭐ 標記為不懂</button>
            <button class="btn del-btn full" onclick="deleteWord(event)">🗑️ 刪除目前單字</button>
        </div>

        <div class="backup-section">
            <button class="backup-btn" onclick="exportData()">💾 備份檔案</button>
            <button class="backup-btn" onclick="importData()">📂 恢復檔案</button>
        </div>
    </div>

    <script>
        let allWords = JSON.parse(localStorage.getItem('myWords')) || [];
        let isFilterMode = false; // 只看星號模式
        let selectedCategory = "all"; // 當前選取的分類
        let displayList = [];
        let currentIndex = 0;
        let jpVoice = null;

        function loadVoices() {
            jpVoice = window.speechSynthesis.getVoices().find(v => v.lang.includes('ja'));
        }
        window.speechSynthesis.onvoiceschanged = loadVoices;
        loadVoices();

        function flipCard() { document.getElementById('flashcard').classList.toggle('flipped'); }

        // 更新分類選單與輸入提示
        function updateCategoryUI() {
            const filterSelect = document.getElementById('catFilter');
            const catHistory = document.getElementById('cat-history');
            const categories = [...new Set(allWords.map(w => w.cat || "未分類"))];
            
            // 更新下拉篩選選單
            filterSelect.innerHTML = '<option value="all">📁 顯示所有分類</option>';
            categories.forEach(cat => {
                const opt = document.createElement('option');
                opt.value = cat;
                opt.innerText = `📁 ${cat}`;
                filterSelect.appendChild(opt);
            });
            filterSelect.value = selectedCategory;

            // 更新輸入提示
            catHistory.innerHTML = '';
            categories.forEach(cat => {
                const opt = document.createElement('option');
                opt.value = cat;
                catHistory.appendChild(opt);
            });
        }

        // 核心邏輯：決定現在要顯示哪些單字
        function updateDisplayList() {
            // 1. 先過濾分類
            let filtered = selectedCategory === "all" 
                ? allWords 
                : allWords.filter(w => (w.cat || "未分類") === selectedCategory);
            
            // 2. 再過濾星號
            if (isFilterMode) {
                filtered = filtered.filter(w => w.isHard);
            }

            displayList = filtered;
            if (currentIndex >= displayList.length) currentIndex = 0;
            render();
            updateCategoryUI();
        }

        function addWord() {
            const cat = document.getElementById('catInput').value.trim() || "未分類";
            const jp = document.getElementById('jpInput').value.trim();
            const cn = document.getElementById('cnInput').value.trim();
            
            if (jp && cn) {
                allWords.push({ jp, cn, cat, isHard: false, id: Date.now() });
                save();
                selectedCategory = cat; // 自動切換到剛新增的分類
                currentIndex = allWords.filter(w => w.cat === cat).length - 1;
                updateDisplayList();
                speakWord();
                document.getElementById('jpInput').value = '';
                document.getElementById('cnInput').value = '';
            }
        }

        function changeCategoryFilter() {
            selectedCategory = document.getElementById('catFilter').value;
            currentIndex = 0;
            updateDisplayList();
        }

        function toggleFilter() {
            isFilterMode = !isFilterMode;
            document.getElementById('filterBtn').className = isFilterMode ? "btn btn-sm is-hard" : "btn btn-sm";
            currentIndex = 0;
            updateDisplayList();
        }

        function shuffleWords() {
            displayList.sort(() => Math.random() - 0.5);
            currentIndex = 0;
            render();
        }

        function render() {
            const counter = document.getElementById('counter');
            const wordDisp = document.getElementById('word-display');
            const meanDisp = document.getElementById('meaning-display');
            const catDisp = document.getElementById('cat-display');
            const pinBtn = document.getElementById('pinBtn');
            
            counter.innerText = `數量: ${displayList.length}`;

            if (displayList.length === 0) {
                wordDisp.innerText = isFilterMode ? "此分類無標記" : "分類空空如也";
                meanDisp.innerText = "請新增單字";
                catDisp.innerText = "-";
                pinBtn.style.display = "none";
                return;
            }

            pinBtn.style.display = "block";
            const current = displayList[currentIndex];
            wordDisp.innerText = current.jp;
            meanDisp.innerText = current.cn;
            catDisp.innerText = current.cat || "未分類";
            pinBtn.innerText = current.isHard ? "🌟 已標記不懂" : "⭐ 標記為不懂";
            pinBtn.className = current.isHard ? "btn full is-hard" : "btn full";
            document.getElementById('flashcard').classList.remove('flipped');
        }

        function speakWord(e) {
            if (e) e.stopPropagation();
            if (displayList.length > 0) {
                window.speechSynthesis.cancel();
                const utter = new SpeechSynthesisUtterance(displayList[currentIndex].jp);
                if (jpVoice) utter.voice = jpVoice;
                utter.lang = 'ja-JP';
                utter.rate = 0.85;
                window.speechSynthesis.speak(utter);
            }
        }

        function deleteWord(e) {
            e.stopPropagation();
            if (displayList.length === 0) return;
            if (confirm("確定刪除此單字？")) {
                const targetId = displayList[currentIndex].id;
                allWords = allWords.filter(w => w.id !== targetId);
                save();
                updateDisplayList();
            }
        }

        function togglePin(e) {
            e.stopPropagation();
            const current = displayList[currentIndex];
            current.isHard = !current.isHard;
            save();
            render();
        }

        function save() { localStorage.setItem('myWords', JSON.stringify(allWords)); }
        function nextWord(e) { e.stopPropagation(); if(displayList.length > 0) { currentIndex = (currentIndex + 1) % displayList.length; render(); } }
        function prevWord(e) { e.stopPropagation(); if(displayList.length > 0) { currentIndex = (currentIndex - 1 + displayList.length) % displayList.length; render(); } }

        function exportData() {
            const blob = new Blob([JSON.stringify(allWords)], {type: "text/plain"});
            const a = document.createElement("a");
            a.href = URL.createObjectURL(blob);
            a.download = "jp_backup.txt";
            a.click();
        }

        function importData() {
            const input = document.createElement("input");
            input.type = "file";
            input.onchange = e => {
                const reader = new FileReader();
                reader.onload = event => {
                    allWords = JSON.parse(event.target.result);
                    save();
                    location.reload();
                };
                reader.readAsText(e.target.files[0]);
            };
            input.click();
        }
        
        updateDisplayList();
    </script>
</body>
</html>
