<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>日文單字 App</title>
    <style>
        :root { --primary: #007bff; --danger: #ff4757; --warning: #ffa502; --success: #2ed573; --bg: #f8f9fa; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        .app-container { width: 100%; max-width: 400px; }
        
        /* 頂部分類選擇 */
        .top-bar { width: 100%; display: flex; flex-direction: column; gap: 8px; margin-bottom: 10px; }
        select { width: 100%; padding: 14px; border-radius: 15px; border: 2px solid var(--primary); font-size: 16px; font-weight: bold; background: white; outline: none; box-shadow: 0 4px 10px rgba(0,123,255,0.1); }
        .stats-row { display: flex; justify-content: space-between; align-items: center; font-size: 13px; color: #7f8c8d; padding: 0 5px; margin-top: 5px; }

        /* 管理區域（收納式） */
        .admin-toggle { width: 100%; background: #ecedf0; border: none; padding: 10px; border-radius: 10px; color: #2f3542; font-weight: bold; margin-top: 10px; cursor: pointer; }
        .admin-panel { display: none; background: white; padding: 15px; border-radius: 20px; box-shadow: 0 5px 20px rgba(0,0,0,0.05); margin-top: 10px; flex-direction: column; gap: 10px; border: 2px solid transparent; }
        .admin-panel.active { display: flex; }
        .editing { border-color: var(--warning); background: #fffdf2; }
        
        input { padding: 12px; border: 1px solid #ddd; border-radius: 10px; font-size: 16px; outline: none; }
        .btn-group { display: flex; gap: 8px; }
        .btn { border: none; border-radius: 10px; padding: 12px; font-weight: bold; color: white; flex: 1; cursor: pointer; }
        .btn-add { background: var(--primary); }
        .btn-save { background: var(--success); }
        .btn-cancel { background: #95a5a6; }

        /* 閃卡 */
        .card { width: 100%; height: 260px; perspective: 1000px; margin: 15px 0; }
        .card-inner { position: relative; width: 100%; height: 100%; transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); transform-style: preserve-3d; }
        .card.flipped .card-inner { transform: rotateY(180deg); }
        .card-front, .card-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; flex-direction: column; justify-content: center; align-items: center; border-radius: 30px; background: white; box-shadow: 0 10px 30px rgba(0,0,0,0.08); }
        .card-back { transform: rotateY(180deg); background: #f0f7ff; color: var(--primary); }
        
        #word-display { font-size: 2.6rem; font-weight: bold; color: #2f3542; text-align: center; width: 90%; line-height: 1.2; }
        #meaning-display { font-size: 2rem; text-align: center; }
        .cat-tag { position: absolute; top: 18px; left: 25px; font-size: 12px; color: #bdc3c7; font-weight: bold; }
        .star-btn { position: absolute; top: 12px; right: 20px; font-size: 28px; color: #eee; background: none; border: none; padding: 5px; cursor: pointer; transition: 0.2s; }
        .star-btn.active { color: var(--warning); transform: scale(1.1); }

        /* 底部導覽 */
        .nav-controls { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; width: 100%; margin-top: 10px; }
        .nav-btn { background: #ffffff; border: 1px solid #f0f0f0; padding: 16px; border-radius: 18px; font-size: 22px; box-shadow: 0 4px 6px rgba(0,0,0,0.02); cursor: pointer; }
        .btn-sub { font-size: 14px; background: #f8f9fa; color: #7f8c8d; font-weight: bold; }
        .btn-del { color: var(--danger); }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="top-bar">
            <select id="catFilter" onchange="changeCategoryFilter()">
                <option value="all">📁 全部單字</option>
                <option value="favorites">⭐ 已收藏 (星號)</option>
                <hr>
            </select>
            
            <div class="stats-row">
                <span id="counter">0 / 0</span>
                <span id="mode-text">正在背誦：全部</span>
            </div>
            
            <button class="admin-toggle" onclick="toggleAdmin()">⚙️ 管理 / 新增單字</button>
            <div id="adminPanel" class="admin-panel">
                <b id="panelTitle">新增單字</b>
                <input type="text" id="catInput" placeholder="分類 (如: 第一課)" list="cat-history">
                <datalist id="cat-history"></datalist>
                <input type="text" id="jpInput" placeholder="輸入日文或漢字">
                <input type="text" id="cnInput" placeholder="輸入中文意思">
                
                <div id="addBtns">
                    <button class="btn btn-add" style="width:100%" onclick="addWord()">➕ 加入單字本</button>
                </div>
                <div id="editBtns" style="display:none;" class="btn-group">
                    <button class="btn btn-save" onclick="saveEdit()">💾 儲存修改</button>
                    <button class="btn btn-cancel" onclick="cancelEdit()">取消</button>
                </div>
                
                <div style="display:flex; gap:5px; margin-top:5px;">
                    <button class="btn" style="background:#7f8c8d; font-size:11px;" onclick="shuffleWords()">🔀 隨機亂序</button>
                    <button class="btn" style="background:#7f8c8d; font-size:11px;" onclick="exportData()">💾 備份檔案</button>
                    <button class="btn" style="background:#7f8c8d; font-size:11px;" onclick="importData()">📂 匯入備份</button>
                </div>
            </div>
        </div>

        <div class="card" id="flashcard" onclick="flipCard()">
            <div class="card-inner">
                <div class="card-front">
                    <span id="cat-display" class="cat-tag">分類</span>
                    <button id="starBtn" class="star-btn" onclick="togglePin(event)">★</button>
                    <div id="word-display">尚未新增</div>
                    <button style="margin-top:30px; border:none; background:#f1f2f6; padding:12px 25px; border-radius:25px; font-size:14px; font-weight:bold; color:#57606f;" onclick="speakWord(event)">🔊 聽日文發音</button>
                </div>
                <div class="card-back">
                    <div id="meaning-display">意思</div>
                </div>
            </div>
        </div>

        <div class="nav-controls">
            <button class="nav-btn" onclick="prevWord()">⬅️</button>
            <button class="nav-btn" onclick="nextWord()">➡️</button>
            <button class="nav-btn btn-sub" onclick="startEdit()">✏️ 修正單字/分類</button>
            <button class="nav-btn btn-sub btn-del" onclick="deleteWord()">🗑️ 刪除</button>
        </div>
    </div>

    <script>
        let allWords = JSON.parse(localStorage.getItem('myWords')) || [];
        let selectedCategory = "all", displayList = [], currentIndex = 0, editTargetId = null;

        // --- 強制日文發音邏輯 ---
        let jpVoice = null;
        function findJpVoice() {
            const voices = window.speechSynthesis.getVoices();
            jpVoice = voices.find(v => v.lang.toLowerCase().includes('ja')) || voices.find(v => v.lang === 'ja-JP');
        }
        window.speechSynthesis.onvoiceschanged = findJpVoice;
        findJpVoice();

        function speakWord(e) {
            if (e) e.stopPropagation();
            if (displayList.length === 0) return;
            window.speechSynthesis.cancel();
            const utter = new SpeechSynthesisUtterance(displayList[currentIndex].jp);
            if (jpVoice) utter.voice = jpVoice;
            utter.lang = 'ja-JP';
            utter.rate = 0.85;
            window.speechSynthesis.speak(utter);
        }

        function toggleAdmin() { document.getElementById('adminPanel').classList.toggle('active'); }
        function flipCard() { document.getElementById('flashcard').classList.toggle('flipped'); }

            if
