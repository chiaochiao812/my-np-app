<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>日文單字本</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #f4f7f9; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        .app-container { width: 100%; max-width: 400px; }
        .input-section { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 20px; display: flex; flex-direction: column; gap: 10px; }
        input { padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; }
        button { padding: 12px; border: none; border-radius: 8px; background: #007bff; color: white; font-weight: bold; font-size: 16px; }
        .card { width: 100%; height: 220px; perspective: 1000px; margin-bottom: 20px; cursor: pointer; }
        .card-inner { position: relative; width: 100%; height: 100%; transition: transform 0.6s; transform-style: preserve-3d; }
        .card.flipped .card-inner { transform: rotateY(180deg); }
        .card-front, .card-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; flex-direction: column; justify-content: center; align-items: center; border-radius: 20px; background: white; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .card-front { border: 2px solid #007bff; }
        .card-back { background: #e7f3ff; transform: rotateY(180deg); color: #0056b3; font-size: 1.8rem; text-align: center; padding: 10px; }
        #word-display { font-size: 2.2rem; font-weight: bold; }
        .voice-btn { margin-top: 10px; background: #eee; color: #333; padding: 8px 20px; border-radius: 20px; border: none; }
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; }
        .full-btn { grid-column: span 2; }
        .is-hard { background: #ffc107 !important; color: #333 !important; }
    </style>
</head>
<body>
    <div class="app-container">
        <h2 style="text-align:center;">🇯🇵 日文單字手冊</h2>
        <div class="input-section">
            <input type="text" id="jpInput" placeholder="日文/漢字">
            <input type="text" id="readingInput" placeholder="讀音 (選填)">
            <input type="text" id="cnInput" placeholder="中文意思">
            <button onclick="addWord()">➕ 新增單字</button>
        </div>
        <div class="card" id="flashcard" onclick="flipCard()">
            <div class="card-inner">
                <div class="card-front">
                    <div id="word-display">尚未新增</div>
                    <small id="reading-display" style="color: #666;"></small>
                    <button class="voice-btn" onclick="speakWord(event)">🔊 發音</button>
                </div>
                <div class="card-back" id="meaning-display">意思</div>
            </div>
        </div>
        <div class="controls">
            <button onclick="prevWord(event)">⬅️ 上一個</button>
            <button onclick="nextWord(event)">➡️ 下一個</button>
            <button id="pinBtn" class="full-btn" onclick="togglePin(event)">⭐ 標記為不懂</button>
        </div>
    </div>
    <script>
        let words = JSON.parse(localStorage.getItem('myWords')) || [];
        let currentIndex = 0;

        function flipCard() { document.getElementById('flashcard').classList.toggle('flipped'); }

        function addWord() {
            const jp = document.getElementById('jpInput').value;
            const reading = document.getElementById('readingInput').value;
            const cn = document.getElementById('cnInput').value;
            if (jp && cn) {
                words.push({ jp, reading, cn, isHard: false });
                currentIndex = words.length - 1;
                saveAndRender();
                document.getElementById('jpInput').value = '';
                document.getElementById('readingInput').value = '';
                document.getElementById('cnInput').value = '';
            }
        }

        function render() {
            if (words.length === 0) return;
            const current = words[currentIndex];
            document.getElementById('word-display').innerText = current.jp;
            document.getElementById('reading-display').innerText = current.reading ? `(${current.reading})` : '';
            document.getElementById('meaning-display').innerText = current.cn;
            const pinBtn = document.getElementById('pinBtn');
            pinBtn.innerText = current.isHard ? "🌟 已標記不懂" : "⭐ 標記為不懂";
            pinBtn.className = current.isHard ? "full-btn is-hard" : "full-btn";
            document.getElementById('flashcard').classList.remove('flipped');
        }

        function togglePin(e) {
            e.stopPropagation();
            if (words.length > 0) { words[currentIndex].isHard = !words[currentIndex].isHard; saveAndRender(); }
        }

        function speakWord(e) {
            e.stopPropagation();
            if (words.length > 0) {
                const utter = new SpeechSynthesisUtterance(words[currentIndex].jp);
                utter.lang = 'ja-JP';
                window.speechSynthesis.speak(utter);
            }
        }

        function saveAndRender() { localStorage.setItem('myWords', JSON.stringify(words)); render(); }
        function nextWord(e) { e.stopPropagation(); if(words.length > 0) { currentIndex = (currentIndex + 1) % words.length; render(); } }
        function prevWord(e) { e.stopPropagation(); if(words.length > 0) { currentIndex = (currentIndex - 1 + words.length) % words.length; render(); } }
        
        render();
    </script>
</body>
</html>
