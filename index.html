<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>日文單字 App - V1.6</title>
    <style>
        :root { --primary: #007bff; --danger: #ff4757; --warning: #ffa502; --success: #2ed573; --bg: #f8f9fa; }
        
        body { 
            font-family: -apple-system, sans-serif; 
            background: var(--bg); 
            margin: 0; padding: 0; 
            min-height: 100vh; width: 100vw;
            display: flex; flex-direction: column; 
            align-items: center; 
            overflow-x: hidden;
            overflow-y: auto; 
            box-sizing: border-box;
        }

        .app-container { 
            width: 92%; max-width: 400px; 
            display: flex; 
            flex-direction: column; 
            min-height: 100vh;
        }
        
        .header-section { 
            padding-top: 40px; 
            width: 100%; 
        }
        
        .version-tag { font-size: 10px; color: #ddd; text-align: center; margin-bottom: 5px; }
        
        .mode-tabs { display: flex; gap: 8px; margin-bottom: 8px; }
        .tab-btn { flex: 1; padding: 10px; border: none; border-radius: 10px; background: #e2e8f0; color: #4a5568; font-weight: bold; cursor: pointer; font-size: 13px; }
        .tab-btn.active { background: var(--primary); color: white; }
        
        select { width: 100%; padding: 10px; border-radius: 10px; border: 2px solid var(--primary); font-size: 15px; background: white; outline: none; }
        .stats-row { display: flex; justify-content: space-between; align-items: center; font-size: 11px; color: #a4b0be; padding: 4px; }

        .card-area { 
            flex-grow: 1; 
            display: flex; flex-direction: column; 
            align-items: center; justify-content: center; 
            width: 100%;
            padding: 10px 0; 
        }

        .card { width: 100%; height: 210px; perspective: 1000px; }
        .card-inner { position: relative; width: 100%; height: 100%; transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); transform-style: preserve-3d; }
        .card.flipped .card-inner { transform: rotateY(180deg); }
        .card-front, .card-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; flex-direction: column; justify-content: center; align-items: center; border-radius: 25px; background: white; box-shadow: 0 8px 20px rgba(0,0,0,0.06); border: 1px solid #eee; }
        .card-back { transform: rotateY(180deg); background: #f0f7ff; color: var(--primary); }
        
        #word-display { font-size: 2.4rem; font-weight: bold; color: #2f3542; text-align: center; }
        #meaning-display { font-size: 2rem; text-align: center; }
        .cat-tag { position: absolute; top: 15px; left: 20px; font-size: 11px; color: #bdc3c7; }
        .star-btn { position: absolute; top: 10px; right: 15px; font-size: 28px; color: #eee; background: none; border: none; cursor: pointer; }
        .star-btn.active { color: var(--warning); }

        .nav-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 100%; margin-top: 15px; }
        .nav-btn { background: white; border: 1px solid #e0e0e0; padding: 15px; border-radius: 15px; font-size: 24px; cursor: pointer; box-shadow: 0 4px 8px rgba(0,0,0,0.03); }

        /* --- 修正：調降高度並加入安全區域 --- */
        .bottom-section { 
            width: 100%; display: flex; flex-direction: column; 
            padding-bottom: calc(35px + env(safe-area-inset-bottom)); 
            margin-top: auto;
        } 
        
        .action-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 15px; } 
        .btn-sub { font-size: 14px; background: #f1f2f6; color: #57606f; font-weight: 600; padding: 12px; border: none; border-radius: 12px; cursor: pointer; }
        .admin-toggle { width: 100%; background: #dfe4ea; border: none; padding: 15px; border-radius: 12px; color: #2f3542; font-weight: bold; cursor: pointer; font-size: 14px; }

        .admin-panel { display: none; background: white; padding: 20px; border-radius: 25px 25px 0 0; box-shadow: 0 -10px 40px rgba(0,0,0,0.15); flex-direction: column; position: fixed; bottom: 0; left: 0; right: 0; z-index: 100; border-top: 4px solid var(--primary); }
        .admin-panel.active { display: flex; }
        .admin-panel input { margin-bottom: 10px; padding: 14px; border: 1px solid #ddd; border-radius: 10px; font-size: 16px; outline: none; }
        .util-row { display: flex; gap: 8px; margin: 15px 0; } 
        .btn-util { background: #7f8c8d; font-size: 12px; flex: 1; border: none; border-radius: 10px; padding: 12px; color: white; font-weight: bold; cursor: pointer; }
        .btn-main { width: 100%; border: none; border-radius: 12px; padding: 15px; font-weight: bold; color: white; cursor: pointer; font-size: 16px; background: var(--primary); }
        .overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 90; }
        .overlay.active { display: block; }
    </style>
</head>
<body>
    ```

主要改動說明：
1. **`.bottom-section`**: 將 `padding-bottom` 從 `140px` 改為 `calc(35px + env(safe-area-inset-bottom))`。這會讓按鈕區塊靠近底部，但保留足夠的安全距離。
2. **`.card-area`**: 調整了 `padding` 讓版面在按鈕下移後依然維持視覺平衡。
